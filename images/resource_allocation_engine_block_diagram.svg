<svg width="1000" height="720" viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <title>Resource Allocation Engine — Top-Level Architecture</title>
  <desc>Block diagram showing 8 clients issuing requests to three continuously-running arbiter cores (Fixed Priority, Round Robin, Dynamic Priority/Aging), a mode-select mux choosing which core's output drives the engine outputs, downstream shared resources, and a utilization/contention counter block. All connections use orthogonal straight-line routing.</desc>

  <defs>
    <marker id="rae-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="rae-arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8A8A85" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1000" height="720" fill="#FFFFFF"/>

  <!-- Outer container -->
  <rect x="30" y="50" width="940" height="620" rx="20" fill="#FAFAF7" stroke="#C9C7BE" stroke-width="0.75"/>
  <text x="55" y="82" font-size="16" font-weight="600" fill="#232320">Resource Allocation Engine — Top-Level Architecture</text>
  <text x="55" y="102" font-size="11" fill="#6B6B66">8 clients &#8226; 2 shared resources &#8226; 3 selectable arbitration policies, always running in parallel</text>

  <text x="135" y="132" font-size="11" fill="#6B6B66" text-anchor="middle">Client Requests</text>
  <text x="400" y="132" font-size="11" fill="#6B6B66" text-anchor="middle">Parallel Arbiter Cores (all active every cycle)</text>
  <text x="895" y="132" font-size="11" fill="#6B6B66" text-anchor="middle">Engine Outputs</text>

  <!-- ============ Client / control inputs (left column) ============ -->
  <g id="inputs">
    <rect x="60" y="304" width="150" height="64" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.75"/>
    <text x="135" y="330" font-size="13" font-weight="500" fill="#232320" text-anchor="middle">Clients</text>
    <text x="135" y="348" font-size="12" fill="#6B6B66" text-anchor="middle">req[7:0]</text>

    <rect x="60" y="390" width="150" height="40" rx="6" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.75"/>
    <text x="135" y="414" font-size="12" fill="#232320" text-anchor="middle">clk, rst_n</text>

    <rect x="610" y="150" width="150" height="40" rx="6" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.75"/>
    <text x="685" y="174" font-size="12" fill="#232320" text-anchor="middle">mode[1:0]</text>
  </g>

  <!-- ============ req fan-out bus (straight lines only) ============ -->
  <g id="req-bus" stroke="#5F5E5A" stroke-width="1.5" fill="none">
    <line x1="210" y1="336" x2="240" y2="336"/>
    <line x1="240" y1="182" x2="240" y2="490"/>
    <line x1="240" y1="182" x2="260" y2="182" marker-end="url(#rae-arrow)"/>
    <line x1="240" y1="336" x2="260" y2="336" marker-end="url(#rae-arrow)"/>
    <line x1="240" y1="490" x2="260" y2="490" marker-end="url(#rae-arrow)"/>
  </g>

  <!-- req tap down to counters (straight, dashed) -->
  <g stroke="#8A8A85" stroke-width="1.25" stroke-dasharray="4 3" fill="none">
    <line x1="240" y1="400" x2="240" y2="595"/>
    <line x1="240" y1="595" x2="610" y2="595" marker-end="url(#rae-arrow-dashed)"/>
  </g>
  <text x="300" y="588" font-size="9.5" fill="#8A8A85">req (popcount)</text>

  <!-- ============ clk/rst_n dashed feed to stateful cores only ============ -->
  <g id="clk-bus" stroke="#8A8A85" stroke-width="1.25" stroke-dasharray="4 3" fill="none">
    <line x1="210" y1="410" x2="228" y2="410"/>
    <line x1="228" y1="336" x2="228" y2="490"/>
    <line x1="228" y1="336" x2="260" y2="336" marker-end="url(#rae-arrow-dashed)"/>
    <line x1="228" y1="490" x2="260" y2="490" marker-end="url(#rae-arrow-dashed)"/>
  </g>
  <text x="150" y="447" font-size="9" fill="#8A8A85">clk/rst_n &#8594; RR &amp; Dynamic only</text>

  <!-- ============ Arbiter core: Fixed Priority ============ -->
  <g id="core-fixed">
    <rect x="260" y="150" width="280" height="64" rx="8" fill="#E8F0FE" stroke="#3B6EA5" stroke-width="0.75"/>
    <text x="400" y="174" font-size="13" font-weight="600" fill="#284A72" text-anchor="middle">Fixed Priority Arbiter</text>
    <text x="400" y="192" font-size="11" fill="#3B6EA5" text-anchor="middle">combinational &#8226; stateless</text>
    <text x="400" y="206" font-size="10" fill="#5C7DA0" text-anchor="middle">low-index bias, no aging</text>
  </g>

  <!-- ============ Arbiter core: Round Robin (rectangular feedback loop) ============ -->
  <g id="core-rr">
    <g stroke="#1E7A46" stroke-width="1.25" fill="none">
      <line x1="360" y1="304" x2="360" y2="284"/>
      <line x1="360" y1="284" x2="440" y2="284"/>
      <line x1="440" y1="284" x2="440" y2="304" marker-end="url(#rae-arrow)"/>
    </g>
    <text x="400" y="276" font-size="9.5" fill="#1E7A46" text-anchor="middle">rr_ptr feedback</text>
    <rect x="260" y="304" width="280" height="64" rx="8" fill="#E6F4EA" stroke="#1E7A46" stroke-width="0.75"/>
    <text x="400" y="328" font-size="13" font-weight="600" fill="#155934" text-anchor="middle">Round Robin Arbiter</text>
    <text x="400" y="346" font-size="11" fill="#1E7A46" text-anchor="middle">rotating pointer state</text>
    <text x="400" y="360" font-size="10" fill="#3E9163" text-anchor="middle">starvation-free under load</text>
  </g>

  <!-- ============ Arbiter core: Dynamic Priority (rectangular feedback loop) ============ -->
  <g id="core-dyn">
    <g stroke="#6A3FA0" stroke-width="1.25" fill="none">
      <line x1="360" y1="458" x2="360" y2="438"/>
      <line x1="360" y1="438" x2="440" y2="438"/>
      <line x1="440" y1="438" x2="440" y2="458" marker-end="url(#rae-arrow)"/>
    </g>
    <text x="400" y="430" font-size="9.5" fill="#6A3FA0" text-anchor="middle">age[7:0] feedback</text>
    <rect x="260" y="458" width="280" height="64" rx="8" fill="#F1E9FB" stroke="#6A3FA0" stroke-width="0.75"/>
    <text x="400" y="482" font-size="13" font-weight="600" fill="#492A72" text-anchor="middle">Dynamic Priority Arbiter</text>
    <text x="400" y="500" font-size="11" fill="#6A3FA0" text-anchor="middle">per-client aging counters</text>
    <text x="400" y="514" font-size="10" fill="#8B63B8" text-anchor="middle">wait-time driven, saturating</text>
  </g>

  <!-- ============ core outputs -> mux (orthogonal straight lines) ============ -->
  <g stroke="#5F5E5A" stroke-width="1.5" fill="none">
    <!-- Fixed -> mux (step down) -->
    <line x1="540" y1="182" x2="575" y2="182"/>
    <line x1="575" y1="182" x2="575" y2="320"/>
    <line x1="575" y1="320" x2="610" y2="320" marker-end="url(#rae-arrow)"/>
    <!-- Round Robin -> mux (straight) -->
    <line x1="540" y1="336" x2="610" y2="336" marker-end="url(#rae-arrow)"/>
    <!-- Dynamic -> mux (step up) -->
    <line x1="540" y1="490" x2="575" y2="490"/>
    <line x1="575" y1="490" x2="575" y2="352"/>
    <line x1="575" y1="352" x2="610" y2="352" marker-end="url(#rae-arrow)"/>
  </g>
  <text x="577" y="250" font-size="9" fill="#6B6B66" text-anchor="middle">gnt[7:0]</text>
  <text x="577" y="262" font-size="9" fill="#6B6B66" text-anchor="middle">res_valid[1:0]</text>
  <text x="577" y="410" font-size="9" fill="#6B6B66" text-anchor="middle">gnt[7:0]</text>
  <text x="577" y="422" font-size="9" fill="#6B6B66" text-anchor="middle">res_valid[1:0]</text>

  <!-- mode control down into mux (straight vertical) -->
  <line x1="685" y1="190" x2="685" y2="304" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#rae-arrow)" fill="none"/>

  <!-- ============ Mode Select Mux ============ -->
  <g id="mode-mux">
    <rect x="610" y="304" width="150" height="64" rx="8" fill="#FFFFFF" stroke="#2C2C2A" stroke-width="1"/>
    <text x="685" y="330" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">Mode Select</text>
    <text x="685" y="346" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">Mux</text>
    <text x="685" y="362" font-size="9.5" fill="#6B6B66" text-anchor="middle">3 cores run always; mux picks output</text>
  </g>

  <!-- mux -> engine outputs (straight) -->
  <line x1="760" y1="336" x2="820" y2="336" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#rae-arrow)" fill="none"/>

  <!-- ============ Engine Outputs ============ -->
  <g id="engine-outputs">
    <rect x="820" y="304" width="150" height="64" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.75"/>
    <text x="895" y="328" font-size="13" font-weight="500" fill="#232320" text-anchor="middle">gnt[7:0]</text>
    <text x="895" y="346" font-size="12" fill="#6B6B66" text-anchor="middle">res_valid[1:0]</text>
  </g>

  <!-- outputs -> shared resources (straight vertical) -->
  <line x1="895" y1="368" x2="895" y2="430" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#rae-arrow)" fill="none"/>

  <g id="shared-resources">
    <rect x="820" y="430" width="150" height="54" rx="8" fill="#FDF3E3" stroke="#B8860B" stroke-width="0.75"/>
    <text x="895" y="452" font-size="13" font-weight="600" fill="#7A5A0A" text-anchor="middle">Shared Resources</text>
    <text x="895" y="468" font-size="11" fill="#B8860B" text-anchor="middle">2 physical slots</text>
  </g>

  <!-- outputs -> counters tap (straight lines routed through the mux/output gap, avoiding Shared Resources) -->
  <g stroke="#8A8A85" stroke-width="1.25" stroke-dasharray="4 3" fill="none">
    <line x1="895" y1="368" x2="790" y2="368"/>
    <line x1="790" y1="368" x2="790" y2="560" marker-end="url(#rae-arrow-dashed)"/>
  </g>
  <text x="800" y="480" font-size="9" fill="#8A8A85">res_valid tap</text>

  <!-- ============ Utilization / Contention Counters ============ -->
  <g id="counters">
    <rect x="610" y="560" width="250" height="70" rx="8" fill="#F4F0FA" stroke="#6B6B66" stroke-width="0.75"/>
    <text x="735" y="582" font-size="13" font-weight="600" fill="#2C2C2A" text-anchor="middle">Utilization &amp; Contention Counters</text>
    <text x="735" y="600" font-size="10.5" fill="#6B6B66" text-anchor="middle">res0_util, res1_util (per-resource use)</text>
    <text x="735" y="615" font-size="10.5" fill="#6B6B66" text-anchor="middle">contention_count, idle_count</text>
  </g>

</svg>
